name: Release

on:
  push:
    branches: [main]
  release:
    types: [released]

jobs:
  version:
    name: Version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}
    steps:
      - id: version
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            # Use the release tag (e.g., v1.2.3) as the version
            VERSION=${{ github.event.release.tag_name }}
            TAG="latest"
          else
            # Use calendar versioning for the main branch
            VERSION=$(date "+%Y.%m.%d-main.${{ github.run_number }}")
            TAG="main"
          fi

          echo "::set-output name=version::$VERSION"
          echo "::set-output name=tag::$TAG"

  npm_gh:
    name: Release [GitHub Packages]
    runs-on: ubuntu-latest
    needs:
      - version
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup

      - run: pnpm exec npm version ${{ needs.version.outputs.version }} --git-tag-version=false
      - run: |
          VERSION="${${{ needs.version.outputs.version }}#v}"
          cargo install cargo-edit
          cargo set-version ${VERSION} --workspace
        working-directory: crates

      - run: pnpm turbo run build:wasm generate:schema --filter "@satlayer/*"
      - run: pnpm publish --access public --tag ${{ needs.version.outputs.tag }} --no-git-checks --filter "@satlayer/*"
