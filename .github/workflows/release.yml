name: Release

on:
  push:
    branches: [main]
  release:
    types: [released]

jobs:
  version:
    name: Version
    runs-on: ubuntu-latest
    outputs:
      npm: ${{ steps.version.outputs.npm }}
      npm_tag: ${{ steps.version.outputs.npm_tag }}
      crate: ${{ steps.version.outputs.crate }}
    steps:
      - id: version
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            VERSION=${{ github.event.release.tag_name }}
            echo "::set-output name=crate::{$VERSION#v}"
            echo "::set-output name=npm::$VERSION"
            echo "::set-output name=npm_tag::latest"
          else
            # Use calendar versioning for the main branch
            VERSION=$(date "+%Y.%m.%d.${{ github.run_number }}")
            echo "::set-output name=crate::0.0.0"
            echo "::set-output name=npm::$VERSION"
            echo "::set-output name=npm_tag::main"
          fi

  npm_gh:
    name: Release [GitHub Packages]
    runs-on: ubuntu-latest
    needs:
      - version
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup

      - run: |
          cargo install cargo-edit
          cargo set-version ${{ needs.version.outputs.crate }} --workspace
        working-directory: crates
      - run: pnpm exec npm version ${{ needs.version.outputs.npm }} --git-tag-version=false

      - run: pnpm turbo run build:wasm generate:schema --filter "@satlayer/*"
      - run: pnpm publish --access public --tag ${{ needs.version.outputs.npm_tag }} --no-git-checks --filter "@satlayer/*"
